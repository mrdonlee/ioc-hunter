  <text x="683" y="150" font-size="14" fill="#ffffff">Kerberoasting · AS-REP Roasting</text>
  <text x="683" y="167" font-size="12" fill="#8b949e">Event 4769/4768  ·  EType 0x17 (RC4-HMAC)</text>
  <rect x="985" y="137" width="70" height="18" rx="4" fill="#3d1c1c"/>
