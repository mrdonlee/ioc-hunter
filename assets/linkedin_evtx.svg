  <text x="683" y="224" font-size="14" fill="#ffffff">RDP · Admin Shares · PsExec pattern</text>
  <text x="683" y="241" font-size="12" fill="#8b949e">Event 4624 / 4648 / 5140</text>
  <rect x="985" y="211" width="70" height="18" rx="4" fill="#2d2208"/>
  <text x="1020" y="224" text-anchor="middle" font-size="10" fill="#d29922" font-weight="600">T1021.001</text>

  <!-- Separator -->
  <rect x="665" y="254" width="462" height="1" fill="#21262d"/>

  <!-- Execution -->
  <text x="665" y="274" font-size="11" fill="#8b949e" letter-spacing="2">EXECUTION / EVASION</text>
  <rect x="665" y="281" width="8" height="36" rx="2" fill="#58a6ff"/>
  <text x="683" y="298" font-size="14" fill="#ffffff">LOLBins · Encoded PowerShell · WMI</text>
  <text x="683" y="315" font-size="12" fill="#8b949e">Event 4688 / 4104  ·  Script-block logging</text>
  <rect x="985" y="285" width="70" height="18" rx="4" fill="#0c1f3d"/>
  <text x="1020" y="298" text-anchor="middle" font-size="10" fill="#58a6ff" font-weight="600">T1059.001</text>

