<svg width="1200" height="628" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Inter', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#c1121f"/>
    </linearGradient>
    <linearGradient id="cardgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2128"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- subtle dot grid -->
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#30363d" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bg)"/>
  <rect width="1200" height="628" fill="url(#dots)"/>

  <!-- Left red accent bar -->
  <rect x="0" y="0" width="6" height="628" fill="url(#accent)"/>

  <!-- Top-left: logo mark -->
  <!-- Shield shape -->
  <path d="M72 48 L108 48 L108 88 Q90 100 72 88 Z" fill="none" stroke="#e63946" stroke-width="2.5" filter="url(#glow)"/>
  <text x="90" y="82" text-anchor="middle" font-size="22" font-weight="700" fill="#e63946" filter="url(#glow)">⚡</text>

  <!-- Project name -->
  <text x="122" y="72" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="3">IOC<tspan fill="#e63946">-</tspan>HUNTER</text>
  <text x="122" y="94" font-size="13" fill="#8b949e" letter-spacing="5">OPEN SOURCE  ·  v0.14</text>

  <!-- Divider -->
  <rect x="54" y="116" width="540" height="1" fill="#30363d"/>

  <!-- Main headline -->
  <text x="54" y="172" font-size="42" font-weight="800" fill="#ffffff">Windows Event Log</text>
  <text x="54" y="222" font-size="42" font-weight="800" fill="#e63946">Threat Detector</text>

  <!-- Subtitle -->
  <text x="54" y="268" font-size="18" fill="#8b949e">Zero-dependency EVTX analyzer — detects real attacks,</text>
  <text x="54" y="292" font-size="18" fill="#8b949e">not just alerts. Maps to MITRE ATT&amp;CK automatically.</text>

  <!-- Stat pills row -->
  <!-- pill 1 -->
  <rect x="54" y="320" width="148" height="38" rx="6" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="128" y="344" text-anchor="middle" font-size="22" font-weight="800" fill="#e63946">25+</text>
  <text x="128" y="356" text-anchor="middle" font-size="10" fill="#8b949e" letter-spacing="1">DETECTION RULES</text>

  <!-- pill 2 -->
  <rect x="214" y="320" width="148" height="38" rx="6" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="288" y="344" text-anchor="middle" font-size="22" font-weight="800" fill="#58a6ff">653</text>
  <text x="288" y="356" text-anchor="middle" font-size="10" fill="#8b949e" letter-spacing="1">TESTS PASSING</text>

  <!-- pill 3 -->
  <rect x="374" y="320" width="148" height="38" rx="6" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="448" y="344" text-anchor="middle" font-size="22" font-weight="800" fill="#3fb950">0</text>
  <text x="448" y="356" text-anchor="middle" font-size="10" fill="#8b949e" letter-spacing="1">DEPENDENCIES</text>

  <!-- GitHub link -->
  <text x="54" y="414" font-size="15" fill="#58a6ff">github.com/platinum2high/ioc-hunter</text>

  <!-- ─────────────── RIGHT PANEL ─────────────── -->
  <!-- Card background -->
  <rect x="640" y="40" width="516" height="548" rx="12" fill="url(#cardgrad)" stroke="#30363d" stroke-width="1"/>

  <!-- Card header -->
