  <text x="683" y="372" font-size="14" fill="#ffffff">Scheduled Tasks · New Services · Run keys</text>
  <text x="683" y="389" font-size="12" fill="#8b949e">Event 4698 / 7045 / 4657</text>
  <rect x="985" y="359" width="70" height="18" rx="4" fill="#1e1433"/>
  <text x="1020" y="372" text-anchor="middle" font-size="10" fill="#bc8cff" font-weight="600">T1053.005</text>

  <!-- Separator -->
  <rect x="665" y="402" width="462" height="1" fill="#21262d"/>

  <!-- Defence Evasion -->
  <text x="665" y="422" font-size="11" fill="#8b949e" letter-spacing="2">DEFENCE EVASION</text>
  <rect x="665" y="429" width="8" height="36" rx="2" fill="#3fb950"/>
  <text x="683" y="446" font-size="14" fill="#ffffff">Log Clearing · Firewall Disabled</text>
  <text x="683" y="463" font-size="12" fill="#8b949e">Event 1102 / 4950  ·  attacker cleanup</text>
  <rect x="985" y="433" width="70" height="18" rx="4" fill="#0d2116"/>
  <text x="1020" y="446" text-anchor="middle" font-size="10" fill="#3fb950" font-weight="600">T1070.001</text>

  <!-- Separator -->
  <rect x="665" y="476" width="462" height="1" fill="#21262d"/>

  <!-- Account -->
  <text x="665" y="496" font-size="11" fill="#8b949e" letter-spacing="2">ACCOUNT MANIPULATION</text>
  <rect x="665" y="503" width="8" height="36" rx="2" fill="#ff9500"/>
  <text x="683" y="520" font-size="14" fill="#ffffff">New Users · Sensitive Group Changes</text>
  <text x="683" y="537" font-size="12" fill="#8b949e">Event 4720 / 4728 / 4732 / 4756</text>
  <rect x="985" y="507" width="70" height="18" rx="4" fill="#2a1800"/>
  <text x="1020" y="520" text-anchor="middle" font-size="10" fill="#ff9500" font-weight="600">T1136.001</text>

  <!-- Bottom bar of card -->
  <rect x="640" y="558" width="516" height="30" rx="0" fill="#1c2128"/>
  <rect x="640" y="558" width="516" height="30" rx="12" fill="#1c2128"/>
  <rect x="640" y="558" width="516" height="18" fill="#1c2128"/>
  <text x="898" y="578" text-anchor="middle" font-size="11" fill="#8b949e" letter-spacing="2">MITRE ATT&amp;CK MAPPED  ·  IOC PIPELINE  ·  SYSMON AWARE</text>

  <!-- Bottom left: hashtags -->
  <text x="54" y="580" font-size="13" fill="#30363d">#ThreatHunting  #DFIR  #BlueTeam  #SOC  #MITREAttack  #Python</text>
