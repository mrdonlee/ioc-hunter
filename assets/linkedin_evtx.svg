  <circle cx="1100" cy="66" r="6" fill="#d29922" opacity="0.9"/>
  <circle cx="1082" cy="66" r="6" fill="#3fb950" opacity="0.9"/>

  <!-- Detection rule rows -->
  <!-- row helper: category label + technique chips -->

